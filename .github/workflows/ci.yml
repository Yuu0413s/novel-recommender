name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: pnpm をセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: CI 動作確認
        run: echo "CI が正常に動作しています"